<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SIMPLware Release Notes</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="SIMPLware Release Notes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

    <!-- Theme: Simple Dark -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

    <!-- Custom theme styles -->
    <style>
        :root {
            /* Variables */
            --color-simpl-sky: hsl(223, 78%, 98%);
            --color-simpl-rain: hsl(209, 45%, 58%);
            --color-simpl-blue: hsl(209, 45%, 34%);
            --color-simpl-night: hsl(208, 59%, 11%);
            --color-simpl-black: hsl(208, 50%, 5%);
            --color-simpl-gray: hsl(210, 11%, 26%);

            /* ------------------- CONTENT ------------------- */
            /* Theme */
            --theme-hue: 209;
            --theme-saturation: 45%;
            --theme-lightness: 58%;
            --theme-color: var(--color-simpl-rain);

            --base-background-color: var(--color-simpl-black);
            --base-color: var(--color-simpl-sky);
            --base-font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";

            --content-max-width: 65em;

            /* Horizontal Rule */
            --hr-border: 1px solid var(--color-simpl-sky);

            /* Mark */
            --mark-background: var(--color-simpl-rain);

            /* Selection */
            --selection-color: var(--color-simpl-blue);

            /* Blockquote */
            --blockquote-background: var(--color-simpl-gray);
            --blockquote-border-radius: var(--border-radius-l);
            --blockquote-padding: 1.2em;

            /* Code */
            --code-font-size: calc(var(--font-size-m) * 0.94);
            --code-block-border-radius: var(--border-radius-l);
            --code-theme-background: var(--color-simpl-gray);
            --code-inline-background: var(--code-theme-background);
            --code-inline-border-radius: var(--border-radius-s);

            /* Headings */
            --heading-h1-color: var(--color-simpl-rain);
            --heading-h2-padding: ;

            /* ------------------- COVER PAGE ------------------- */
            /* --cover-color: ; */
            --cover-max-width: 50em;

            /* Background */
            --cover-background-color: var(--color-simpl-black);
            --cover-background-image: ;

            /* Blockquote (Subtitle) */
            --cover-blockquote-color: ;

            /* Buttons */
            --cover-button-border-radius: var(--border-radius-l);
            --cover-button-padding: 0.5em 2rem;
            --cover-button-text-decoration: none;

            /* Buttons - Primary */
            /* --cover-button-primary-background: var(--theme-color); */
            --cover-button-primary-background--hover: var(--color-simpl-blue);
            --cover-button-primary-border: 1px solid var(--theme-color);
            --cover-button-primary-border--hover: ;
            --cover-button-primary-box-shadow: ;
            --cover-button-primary-box-shadow--hover: ;
            --cover-button-primary-color: var(--color-simpl-night);
            --cover-button-primary-color--hover: ;
            --cover-button-primary-text-decoration: ;
            --cover-button-primary-text-decoration--hover: ;
            --cover-button-primary-text-decoration-color: ;
            --cover-button-primary-text-decoration-color--hover: ;

            /* Heading */
            --cover-heading-font-size: var(--font-size-xxl);
        }

        .release-gate {
            margin-top: 2rem;
            max-width: 28rem;
            place-self: center;
        }

        .release-gate label {
            display: block;
            margin-bottom: 0.75rem;
        }

        .release-gate-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .release-gate-row input[type="password"] {
            flex: 1 1 auto;
            padding: 0.4rem 0.75rem;
            border-radius: var(--cover-button-border-radius);
            border: 1px solid var(--color-simpl-gray);
            background-color: var(--color-simpl-night);
            color: var(--color-simpl-sky);
        }

        .release-gate-row button {
            padding: var(--cover-button-padding);
            border-radius: var(--cover-button-border-radius);
            border: var(--cover-button-primary-border);
            background-color: var(--color-simpl-rain);
            color: var(--color-simpl-night);
            cursor: pointer;
        }

        .release-gate-row button:hover {
            background-color: var(--cover-button-primary-background--hover);
            color: var(--color-simpl-sky);
        }

        .release-gate-error {
            margin-top: 0.75rem;
            color: var(--color-simpl-rain);
        }
    </style>
</head>

<body>
    <div id="app">Please wait...</div>

    <script>
        // Shared weak gate helpers (client-side only, not real security)
        (function () {
            var STORAGE_KEY = 'simpl_rn_unlocked';
            var TARGET_HASH = '#/README';

            function isUnlocked() {
                try {
                    return window.sessionStorage && window.sessionStorage.getItem(STORAGE_KEY) === '1';
                } catch (e) {
                    return false;
                }
            }

            function setUnlocked() {
                try {
                    window.sessionStorage && window.sessionStorage.setItem(STORAGE_KEY, '1');
                } catch (e) {
                    // ignore
                }
            }

            function isCoverHash(hash) {
                if (!hash || hash === '#') {
                    return true;
                }

                var cleaned = hash.replace(/^#/, '');
                if (cleaned === '' || cleaned === '/' || cleaned === '/?') {
                    return true;
                }

                var path = cleaned.split('?')[0];
                return path === '' || path === '/';
            }

            function redirectToCoverIfLocked() {
                if (isUnlocked()) {
                    return;
                }

                if (!isCoverHash(window.location.hash)) {
                    var url = window.location.pathname + window.location.search + '#/';
                    window.location.replace(url);
                }
            }

            function redirectToTargetIfUnlocked() {
                if (!isUnlocked()) {
                    return;
                }

                if (!window.location.hash || window.location.hash === '#/' || window.location.hash === '#') {
                    window.location.hash = TARGET_HASH;
                }
            }

            window.SIMPL_GATE = {
                isUnlocked: isUnlocked,
                setUnlocked: setUnlocked,
                redirectToCoverIfLocked: redirectToCoverIfLocked,
                redirectToTargetIfUnlocked: redirectToTargetIfUnlocked,
            };

            window.addEventListener('hashchange', redirectToCoverIfLocked);
            redirectToCoverIfLocked();
        })();
    </script>

    <script>
        window.$docsify = {
            name: 'SIMPLware Release Notes',
            repo: '',
            coverpage: true,
            onlyCover: true
        };

        window.handleSimplGate = function (event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('#release-gate-input');
            var error = form.querySelector('#release-gate-error');
            var PASS = 'simplware-release';

            if (!input) {
                return false;
            }

            if (input.value === PASS) {
                window.SIMPL_GATE.setUnlocked();

                if (error) {
                    error.style.display = 'none';
                }

                window.SIMPL_GATE.redirectToTargetIfUnlocked();
            } else if (error) {
                error.style.display = 'block';
            }

            return false;
        };
    </script>

    <!-- docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- docsify-themeable -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>

</html>
