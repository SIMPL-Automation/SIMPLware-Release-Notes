<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>SIMPLware Release Notes</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="SIMPLware Release Notes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

    <!-- Theme: Simple Dark -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

    <!-- Custom theme styles -->
    <link rel="stylesheet" href="css/theme-root.css">
    <link rel="stylesheet" href="css/theme-components.css">
</head>

<body>
    <div id="app">Please wait...</div>

    <script>
        // Shared weak gate helpers (client-side only, not real security)
        (function () {
            var STORAGE_KEY = 'simpl_rn_unlocked';
            var TARGET_HASH = '#/README';

            function isUnlocked() {
                try {
                    return window.sessionStorage && window.sessionStorage.getItem(STORAGE_KEY) === '1';
                } catch (e) {
                    return false;
                }
            }

            function setUnlocked() {
                try {
                    window.sessionStorage && window.sessionStorage.setItem(STORAGE_KEY, '1');
                } catch (e) {
                    // ignore
                }
            }

            function isCoverHash(hash) {
                if (!hash || hash === '#') {
                    return true;
                }

                var cleaned = hash.replace(/^#/, '');
                if (cleaned === '' || cleaned === '/' || cleaned === '/?') {
                    return true;
                }

                var path = cleaned.split('?')[0];
                return path === '' || path === '/';
            }

            function redirectToCoverIfLocked() {
                if (isUnlocked()) {
                    return;
                }

                if (!isCoverHash(window.location.hash)) {
                    var url = window.location.pathname + window.location.search + '#/';
                    window.location.replace(url);
                }
            }

            function redirectToTargetIfUnlocked() {
                if (!isUnlocked()) {
                    return;
                }

                if (!window.location.hash || window.location.hash === '#/' || window.location.hash === '#') {
                    window.location.hash = TARGET_HASH;
                }
            }

            window.SIMPL_GATE = {
                isUnlocked: isUnlocked,
                setUnlocked: setUnlocked,
                redirectToCoverIfLocked: redirectToCoverIfLocked,
                redirectToTargetIfUnlocked: redirectToTargetIfUnlocked,
            };

            window.addEventListener('hashchange', redirectToCoverIfLocked);
            redirectToCoverIfLocked();
        })();
    </script>

    <script>
        window.$docsify = {
            name: 'SIMPLware Release Notes',
            repo: '',
            coverpage: true,
            onlyCover: true,
            plugins: [
                function (hook, vm) {
                    hook.doneEach(function () {
                        var root = document.querySelector('.markdown-section');
                        if (!root) {
                            return;
                        }

                        var walker = document.createTreeWalker(
                            root,
                            NodeFilter.SHOW_TEXT,
                            null
                        );

                        var re = /\[#\d+\]/g;
                        var nodesToProcess = [];

                        while (walker.nextNode()) {
                            nodesToProcess.push(walker.currentNode);
                        }

                        nodesToProcess.forEach(function (textNode) {
                            var text = textNode.nodeValue;
                            if (!re.test(text)) {
                                return;
                            }

                            var frag = document.createDocumentFragment();
                            var lastIndex = 0;
                            re.lastIndex = 0;

                            var match;
                            while ((match = re.exec(text)) !== null) {
                                if (match.index > lastIndex) {
                                    frag.appendChild(
                                        document.createTextNode(
                                            text.slice(lastIndex, match.index)
                                        )
                                    );
                                }

                                var span = document.createElement('span');
                                span.className = 'ticket-tag';
                                span.textContent = match[0];
                                frag.appendChild(span);

                                lastIndex = match.index + match[0].length;
                            }

                            if (lastIndex < text.length) {
                                frag.appendChild(
                                    document.createTextNode(text.slice(lastIndex))
                                );
                            }

                            textNode.parentNode.replaceChild(frag, textNode);
                        });
                    });
                }
            ]
        };

        window.handleSimplGate = function (event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('#release-gate-input');
            var error = form.querySelector('#release-gate-error');
            var PASS = 'simplware-release';

            if (!input) {
                return false;
            }

            if (input.value === PASS) {
                window.SIMPL_GATE.setUnlocked();

                if (error) {
                    error.style.display = 'none';
                }

                window.SIMPL_GATE.redirectToTargetIfUnlocked();
            } else if (error) {
                error.style.display = 'block';
            }

            return false;
        };
    </script>

    <!-- docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- docsify-themeable -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>

</html>
